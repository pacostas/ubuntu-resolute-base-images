id = "io.buildpacks.stacks.resolute.static"
homepage = "https://github.com/paketo-buildpacks/ubuntu-resolute-base-images"
maintainer = "Paketo Buildpacks"

platforms = ["linux/amd64", "linux/arm64"]

[build]
  description = "ubuntu:resolute with compilers and shell utilities"
  dockerfile = "./build.Dockerfile"
  gid = 1001
  shell = "/bin/bash"
  uid = 1001

  [build.args]
    architecture = "amd64"

    packages = ""

  [build.platforms."linux/arm64".args]
    architecture = "arm64"

    sources = """
Types: deb
URIs: http://ports.ubuntu.com/ubuntu-ports/
Suites: resolute resolute-updates resolute-security
Components: main universe multiverse
    """

[run]
  description = "resolute for statically-linked applications containing tzdata and ca-certificates"
  dockerfile = "./run/run.Dockerfile"
  gid = 1001
  shell = "/sbin/nologin"
  uid = 1002

  [run.args]
    architecture = "amd64"

    sources = """
Types: deb
URIs: http://archive.ubuntu.com/ubuntu/
Suites: resolute resolute-updates
Components: main universe multiverse
Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

Types: deb
URIs: http://security.ubuntu.com/ubuntu/
Suites: resolute-security
Components: main universe multiverse
Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
"""

    packages = """\
    ca-certificates \
    tzdata"""

  [run.platforms."linux/arm64".args]
    architecture = "arm64"

    sources = """
Types: deb
URIs: http://ports.ubuntu.com/ubuntu-ports/
Suites: resolute resolute-updates resolute-security
Components: main universe multiverse
    """
